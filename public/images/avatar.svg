<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a0f33"/>
      <stop offset="1" stop-color="#0a0512"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset="0.5" stop-color="#d946ef"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="50%">
      <stop offset="0" stop-color="#b026ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#b026ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="480" fill="url(#bg)"/>
  <rect width="480" height="480" fill="url(#glow)"/>
  <!-- silueta -->
  <g fill="url(#accent)">
    <circle cx="240" cy="186" r="86"/>
    <path d="M104 430c0-79 61-132 136-132s136 53 136 132z"/>
  </g>
  <!-- iniciales sutiles -->
  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle"
        font-family="'Sora',sans-serif" font-size="120" font-weight="800"
        fill="#0a0512" opacity="0.18">RC</text>
  <rect x="2" y="2" width="476" height="476" rx="2" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
</svg>
